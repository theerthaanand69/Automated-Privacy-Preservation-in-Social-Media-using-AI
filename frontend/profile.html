<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ------------------------------
           Profile page styles
        ------------------------------- */
        :root {
            --bg: #f1f5f7;
            --surface: rgba(255, 255, 255, 0.88);
            --surface-strong: #ffffff;
            --text: #0f141a;
            --muted: #586571;
            --line: rgba(15, 20, 26, 0.12);
            --accent: #ff6b4a;
            --shadow: 0 30px 70px rgba(15, 23, 42, 0.14);
            --glow-a: rgba(62, 198, 223, 0.24);
            --glow-b: rgba(255, 121, 84, 0.2);
            --glow-c: rgba(94, 219, 163, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        /* Page background */
        body {
            margin: 0;
            font-family: "Space Grotesk", sans-serif;
            background:
                radial-gradient(circle at 12% 12%, var(--glow-a), transparent 36%),
                radial-gradient(circle at 88% 8%, var(--glow-b), transparent 34%),
                radial-gradient(circle at 78% 78%, var(--glow-c), transparent 38%),
                linear-gradient(180deg, #f7fbfb 0%, var(--bg) 100%);
            color: var(--text);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            opacity: 0.65;
        }

        body::before {
            background:
                radial-gradient(circle at 18% 25%, rgba(62, 198, 223, 0.2), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(255, 121, 84, 0.16), transparent 38%);
            animation: drift 18s ease-in-out infinite;
        }

        body::after {
            background:
                radial-gradient(circle at 26% 82%, rgba(94, 219, 163, 0.2), transparent 42%),
                radial-gradient(circle at 90% 70%, rgba(255, 200, 120, 0.14), transparent 45%);
            animation: drift 22s ease-in-out infinite reverse;
        }

        /* Page container */
        .page {
            max-width: 1120px;
            margin: 0 auto;
            padding: 28px 20px 48px;
        }

        /* Header toolbar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            padding: 14px 18px;
            border-radius: 24px;
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            animation: floatIn 0.6s ease both;
        }

        .topbar-copy {
            display: grid;
            gap: 4px;
        }

        .topbar-copy small {
            color: var(--muted);
            line-height: 1.5;
        }

        /* Main profile card */
        .profile-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 30px;
            padding: 30px;
            display: grid;
            grid-template-columns: 136px 1fr;
            gap: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            animation: floatIn 0.6s ease both;
            animation-delay: 0.06s;
        }

        .avatar {
            width: 136px;
            height: 136px;
            border-radius: 50%;
            object-fit: cover;
            background: #eee;
            box-shadow: 0 18px 34px rgba(255, 107, 74, 0.2);
        }

        .stats {
            display: flex;
            gap: 14px;
            margin: 14px 0 16px;
            flex-wrap: wrap;
        }

        .stats span {
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            font-size: 14px;
        }

        /* Post grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }

        /* Post tile */
        .post-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            animation: floatIn 0.6s ease both;
        }

        .post-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        .post-media {
            position: relative;
            overflow: hidden;
        }

        .media-watermark-tag {
            position: absolute;
            right: 12px;
            bottom: 12px;
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(15, 20, 26, 0.6);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.03em;
            pointer-events: none;
        }

        .post-card .meta {
            padding: 16px;
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
        }

        .meta-line {
            margin-top: 8px;
            color: var(--muted);
        }

        a,
        button {
            color: var(--accent);
            text-decoration: none;
        }

        button {
            border: 1px solid var(--line);
            background: var(--surface-strong);
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 600;
        }

        h1 {
            margin: 0 0 8px;
            font-family: "Instrument Serif", serif;
            font-size: clamp(2.4rem, 5vw, 3.6rem);
            line-height: 0.95;
            font-weight: 400;
            letter-spacing: -0.04em;
        }

        .subtitle {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .bio {
            color: var(--muted);
            max-width: 650px;
            line-height: 1.7;
        }

        .section-title {
            margin: 0 0 14px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .empty-posts {
            padding: 26px;
            border-radius: 24px;
            border: 1px dashed var(--line);
            background: var(--surface);
            color: var(--muted);
            line-height: 1.7;
            text-align: center;
            box-shadow: var(--shadow);
            animation: floatIn 0.6s ease both;
        }

        @media (max-width: 720px) {
            .profile-card {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .avatar {
                margin: 0 auto;
            }

            .stats {
                justify-content: center;
            }
        }

        @keyframes drift {
            0% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(10px, -12px, 0); }
            100% { transform: translate3d(0, 0, 0); }
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(14px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (prefers-reduced-motion: reduce) {
            body::before,
            body::after,
            .topbar,
            .privacy-banner,
            .profile-card,
            .post-card,
            .empty-posts {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <!-- ===============================
         Profile View
    =============================== -->
    <div class="page">
        <!-- Top toolbar -->
        <div class="topbar">
            <div class="topbar-copy">
                <a href="feed.html">Back to feed</a>
                <small>Review your profile details and uploaded posts in one place.</small>
            </div>
            <button id="refreshBtn">Refresh</button>
        </div>

        <!-- User summary -->
        <div class="profile-card">
            <img id="avatar" class="avatar" src="profile.jpeg" alt="">
            <div>
                <h1 id="username">Profile</h1>
                <div id="fullName" class="subtitle"></div>
                <div class="stats" id="stats"></div>
                <p id="bio" class="bio"></p>
            </div>
        </div>

        <!-- Posts grid -->
        <p class="section-title">Posts</p>
        <div class="grid" id="postGrid"></div>
    </div>

    <script>
        // ---------------------------------
        // Load profile data from backend
        // ---------------------------------
        const API_BASE = "http://127.0.0.1:8000";
        const currentUser = (localStorage.getItem("username") || "user").trim() || "user";

        async function loadProfile() {
            const response = await fetch(`${API_BASE}/profile/${encodeURIComponent(currentUser)}?viewer=${encodeURIComponent(currentUser)}`);
            if (!response.ok) return;
            const profile = await response.json();

            document.getElementById("username").innerText = profile.username;
            document.getElementById("fullName").innerText = profile.full_name || profile.username;
            document.getElementById("bio").innerText = profile.bio || "No bio yet.";
            document.getElementById("stats").innerHTML = `
                <span>${profile.posts.length} posts</span>
                <span>${profile.followers_count} followers</span>
                <span>${profile.following_count} following</span>
            `;
            if (profile.avatar_url) {
                document.getElementById("avatar").src = profile.avatar_url;
            }

            document.getElementById("postGrid").innerHTML = profile.posts.length ? profile.posts.map((post) => `
                <div class="post-card">
                    <div class="post-media">
                        <img src="${API_BASE}${post.image_url}" alt="" draggable="false">
                        <div class="media-watermark-tag">${profile.username}</div>
                    </div>
                    <div class="meta">
                        <div><strong>${post.visibility}</strong></div>
                        <div>${(post.caption_public || post.caption || "").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                        <div class="meta-line">${post.likes_count || 0} likes | ${post.saved_count || 0} saves</div>
                    </div>
                </div>
            `).join("") : `<div class="empty-posts">No posts yet. Create your first post from the feed and it will appear here.</div>`;
        }

        // Refresh button
        document.getElementById("refreshBtn").onclick = loadProfile;
        loadProfile();
    </script>
</body>
</html>
